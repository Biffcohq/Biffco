name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint + Typecheck + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgis/postgis:15-3.3-alpine  # Alineado con docker-compose.yml local
        env:
          POSTGRES_USER: biffco
          POSTGRES_PASSWORD: biffco_ci
          POSTGRES_DB: biffco_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
          
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
        
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
          
      - name: Inject Doppler secrets
        uses: dopplerhq/secrets-fetch-action@v1.1.3
        # Fail gracefully if secret config isn't applied yet to repo
        continue-on-error: true
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          doppler-project: biffco
          doppler-config: staging
          inject-env-vars: true
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Run migrations (CI DB)
        run: |
          DATABASE_URL_UNPOOLED="postgresql://biffco:biffco_ci@localhost:5432/biffco_test" \
          pnpm db:migrate || true 
        # Added true fallback just in case script relies on raw psql
        
      # ─── EL TEST MÁS IMPORTANTE: el invariante arquitectónico ───
      - name: Test invariante ESLint (core no puede importar verticals)
        run: |
          mkdir -p packages/core/src
          echo "import type { } from '@biffco/livestock'" > packages/core/src/__test_invariant.ts
          # ESLint fallará con 1 si rompe la regla
          if pnpm eslint packages/core/src/__test_invariant.ts 2>&1 | grep -q "INVARIANTE"; then
            echo "✅ Invariante ESLint funcionando correctamente"
            rm packages/core/src/__test_invariant.ts
          else
            echo "❌ El invariante ESLint NO está funcionando. BLOQUEANDO MERGE."
            rm packages/core/src/__test_invariant.ts
            exit 1
          fi

      - name: Lint
        run: pnpm lint
        
      - name: Typecheck
        run: pnpm typecheck
        
      - name: Build
        run: pnpm build

  # ─── Detectar secretos en el código ─────────────────────────────
  secrets-check:
    name: Check for hardcoded secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
